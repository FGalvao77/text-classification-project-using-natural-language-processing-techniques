name: Daily Pipeline

"on":
  schedule:
    - cron: "0 8 * * *"     # todo dia às 08:00 UTC
  workflow_dispatch:
    inputs:
      reset_cursor:
        description: 'Se true, reingere todos os dados.'
        default: 'false'

jobs:
  pipeline:
    runs-on: ubuntu-latest

    env:
      TYPEFORM_TOKEN:     ${{ secrets.TYPEFORM_TOKEN }}
      TYPEFORM_FORM_ID:   ${{ secrets.TYPEFORM_FORM_ID }}
      FIELD_NAME:         ${{ secrets.FIELD_NAME }}
      FIELD_EMAIL:        ${{ secrets.FIELD_EMAIL }}
      FIELD_SUBJECT:      ${{ secrets.FIELD_SUBJECT }}
      FIELD_MESSAGE:      ${{ secrets.FIELD_MESSAGE }}
      OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL:       ${{ secrets.OPENAI_MODEL }}
      SLACK_BOT_TOKEN:    ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID:   ${{ secrets.SLACK_CHANNEL_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "latest"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Download spaCy model
        run: uv run python -m spacy download pt_core_news_sm

      - name: Create data directories
        run: mkdir -p data/staging/email models

      - name: Validar TYPEFORM_TOKEN
        run: |
          if [ -z "$TYPEFORM_TOKEN" ]; then
            echo "ERRO: TYPEFORM_TOKEN está vazio!"; exit 1
          fi
          if [ -z "$TYPEFORM_FORM_ID" ]; then
            echo "ERRO: TYPEFORM_FORM_ID está vazio!"; exit 1
          fi
          echo "Form ID: $TYPEFORM_FORM_ID"

          ME=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TYPEFORM_TOKEN" \
            https://api.typeform.com/me)
          echo "GET /me: $ME"

          RESP=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TYPEFORM_TOKEN" \
            "https://api.typeform.com/forms/$TYPEFORM_FORM_ID/responses?page_size=1")
          echo "GET /forms/$TYPEFORM_FORM_ID/responses: $RESP"

          if [ "$RESP" != "200" ]; then
            echo "ERRO: não foi possível acessar as respostas (HTTP $RESP)." 
            exit 1
          fi
          echo "Acesso às respostas OK."

      - name: "1. Ingestão de Dados (Typeform)"
        run: |
          if [ "${{ github.event.inputs.reset_cursor }}" == "true" ]; then
            uv run python src/form_ingest.py --reset-cursor
          else
            uv run python src/form_ingest.py
          fi

      - name: "2. Consolidação de Mensagens"
        run: uv run python src/merge_messages.py

      - name: "3. Limpeza e Anotação de Texto"
        run: |
          PYTHONPATH=src uv run python src/clean_and_annotate.py
          if [ ! -s data/unified_clean.csv ]; then
            echo "Nenhum dado novo encontrado. Encerrando pipeline prematuramente."
            exit 0
          fi
          # Adicionalmente, verifica se o CSV tem apenas o cabeçalho
          ROWS=$(tail -n +2 data/unified_clean.csv | wc -l)
          if [ "$ROWS" -eq 0 ]; then
            echo "Nenhum registro nos dados consolidados. Encerrando pipeline prematuramente."
            exit 0
          fi

      - name: "4. Ajuste do Modelo de Sentimento"
        run: uv run python src/train_sentiment.py --data data/unified_clean.csv --out models/sentiment.joblib

      - name: "5. Predição de Sentimento"
        run: PYTHONPATH=src uv run python src/predict.py

      - name: "6. Priorização e Pós-processamento"
        run: uv run python src/postprocessing.py

      - name: "7. Geração de Respostas (LLM)"
        run: uv run python src/llm_generate_replies.py

      - name: "8. Notificação via Slack Bot"
        run: uv run python src/send_to_slack_bot.py
